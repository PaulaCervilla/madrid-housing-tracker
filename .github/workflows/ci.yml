name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Force Node.js 24 for any JavaScript action that hasn't migrated yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      # All actions below are pinned to versions that ship with Node.js 24
      # to avoid the "Node.js 16/20 actions are deprecated" warnings.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Upload generated dashboard (if any)
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: dashboard-${{ matrix.python-version }}
          path: output/dashboard.html
          if-no-files-found: ignore
